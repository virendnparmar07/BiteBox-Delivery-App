<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/ef08658b28.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="CSS/styles.css">
    <link rel="icon" href="images/favicon/favicon_io/" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>BiteBox</title>
</head>
<body>
    <section class="auth-container">
        <div class="auth-box">
            <h2>Create An Account</h2>
            <form>
                <label for="Name">Name: </label>
                <input type="text" placeholder="Full Name" required>
                
                <label for="Email">Email: </label>
                <input type="email" placeholder="Enter Email" required>

                <label for="Password">Password: </label>
                <input type="password" placeholder="Enter Password" required>

                <label for="confirm">Confirm Password: </label>
                <input type="password" placeholder="Enter the Same Password" required>

                <button type="submit">Sign Up</button>
            </form>
            <br>
            <hr>
            <p>Already Have an Account? <a href="login.html">Login</a></p>
        </div>
    </section>
</body>
